name: Build TWRP

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare
        run: |
          sudo apt update && sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip bc
          mkdir -p ~/twrp
          cd ~/twrp
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_omni.git -b twrp-12.1
          repo sync -j8 --force-sync

      - name: Setup Device Tree
        run: |
          # Bikin folder device tree yang bersih
          mkdir -p ~/twrp/device/infinix/X6840
          # Copy file dari repo lo (exclude .github biar nggak error)
          rsync -av --exclude='.github' . ~/twrp/device/infinix/X6840/

      - name: Build
        run: |
          cd ~/twrp
          source build/envsetup.sh
          export ALLOW_MISSING_DEPENDENCIES=true
          lunch omni_X6840-eng
          mka vendor_bootimage

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-X6840
          path: ~/twrp/out/target/product/X6840/vendor_boot.img
