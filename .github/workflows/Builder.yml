    - name: Proses Compile Sesuai Standard Prosedur Wiki
      run: |
        # Cari di mana folder fox_12.1 berada
        echo "Mencari lokasi folder fox_12.1..."
        find /home/runner -type d -name "fox_12.1"
        
        # Masuk ke folder yang ditemukan (Gue pakai variable biar gak error)
        FOX_PATH=$(find /home/runner -type d -name "fox_12.1" | head -n 1)
        cd $FOX_PATH
        
        # Export variabel wajib sesuai Wiki
        export ALLOW_MISSING_DEPENDENCIES=true
        export FOX_BUILD_DEVICE=X6840
        export LC_ALL="C"
        
        # Fitur optimasi
        export FOX_VANILLA_BUILD=1
        export FOX_USE_TWRP_RECOVERY_IMAGE_BUILDER=true
        export FOX_REPLACE_BUSYBOX_FOR_TWRP=true
        export FOX_USE_BASH_SHELL=true
        export FOX_ASH_IS_BASH=true
        export FOX_DRASTIC_SIZE_REDUCTION=1
        
        # Mulai kompilasi
        source build/envsetup.sh
        lunch twrp_X6840-eng && mka adbd recoveryimage
